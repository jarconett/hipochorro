# Hipochorro — Tema Material 3 / Android (superficies tonales, contraste legible)
[server]
headless = true

[browser]
gatherUsageStats = false

[theme]
base = "light"
font = "Roboto Flex:https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,400..600&display=swap"
headingFont = "Roboto Flex:https://fonts.googleapis.com/css2?family=Roboto+Flex:opsz,wght@8..144,500..700&display=swap"
baseFontSize = "16px"
baseFontWeight = "400"
baseRadius = "1rem"
buttonRadius = "1.5rem"

[theme.light]
primaryColor = "#6750A4"
backgroundColor = "#FEF7FF"
secondaryBackgroundColor = "#F3EDF7"
textColor = "#1C1B1F"
borderColor = "#CAC4D0"

[theme.dark]
primaryColor = "#D0BCFF"
backgroundColor = "#1C1B1F"
secondaryBackgroundColor = "#2B2930"
textColor = "#E6E1E5"
borderColor = "#938F99"
